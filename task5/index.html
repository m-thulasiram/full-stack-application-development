<!DOCTYPE html>
<html>
<head>
<title>Shopping Cart App</title>
<style>
body { font-family: Arial; text-align: center; }
.product { border: 1px solid #ccc; padding: 15px; margin: 10px; display: inline-block; }
button { padding: 8px 15px; cursor: pointer; margin-top: 5px; }
#cart { margin-top: 20px; }
</style>
</head>
<body>

<h2>🛒 Shopping Cart</h2>

<div class="product">
    <h3>Product A</h3>
    <p>₹500</p>
    <button onclick="addToCart('Product A', 500)">Add</button>
</div>

<div class="product">
    <h3>Product B</h3>
    <p>₹300</p>
    <button onclick="addToCart('Product B', 300)">Add</button>
</div>

<div class="product">
    <h3>Product C</h3>
    <p>₹200</p>
    <button onclick="addToCart('Product C', 200)">Add</button>
</div>

<div id="cart">
    <h3>Cart Items</h3>
    <ul id="cartList"></ul>
    <h3 id="total">Total: ₹0</h3>
    <button onclick="checkout()">Checkout</button>
</div>

<script>
let cart = [];
let total = 0;

function addToCart(name, price) {
    cart.push({name, price});
    total += price;
    updateCart();
}

function updateCart() {
    let list = document.getElementById("cartList");
    list.innerHTML = "";

    cart.forEach((item, index) => {
        let li = document.createElement("li");
        li.innerText = item.name + " - ₹" + item.price;

        let removeBtn = document.createElement("button");
        removeBtn.innerText = "Remove";
        removeBtn.onclick = () => removeItem(index);

        li.appendChild(removeBtn);
        list.appendChild(li);
    });

    document.getElementById("total").innerText = "Total: ₹" + total;
}

function removeItem(index) {
    total -= cart[index].price;
    cart.splice(index, 1);
    updateCart();
}

function checkout() {
    alert("Total amount: ₹" + total + "\nThank you for shopping!");
    cart = [];
    total = 0;
    updateCart();
}
</script>

</body>
</html>
