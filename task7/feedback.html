<!DOCTYPE html>
<html>
<head>
    <title>Feedback Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Customer Feedback Form</h2>

    <form>

        <input type="text" id="name" placeholder="Enter Name" onkeyup="validateName()">

        <input type="email" id="email" placeholder="Enter Email" onkeyup="validateEmail()">

        <textarea id="message" placeholder="Enter Feedback" onkeyup="validateMessage()"></textarea>

        <button type="button" ondblclick="submitForm()">Submit</button>

    </form>
</div>

<script src="script.js"></script>

</body>
</html>
